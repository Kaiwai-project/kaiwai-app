name: 🗓️ KAIWAI 캘린더 자동 업데이트

on:
  # ─── 매일 자정 KST 자동 실행 (UTC 15:00 = KST 00:00) ───
  schedule:
    - cron: "0 15 * * *"

  # ─── GitHub Actions 탭에서 수동 실행 가능 ───
  workflow_dispatch:

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # calendar_data.json 커밋·푸시 권한

    steps:
      # ① 저장소 체크아웃
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ② Python 3.11 세팅
      - name: 🐍 Python 세팅
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ③ 의존성 설치
      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install apify-client anthropic

      # ④ 스크래퍼 실행
      - name: 🔍 캘린더 데이터 수집
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IG_COOKIE: ${{ secrets.IG_COOKIE }}
          TW_COOKIE: ${{ secrets.TW_COOKIE }}
        run: python update_calendar.py

      # ⑤ 변경된 calendar_data.json 커밋 & 푸시
      - name: 💾 JSON 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar_data.json
          git diff --staged --quiet \
            || git commit -m "chore: 캘린더 자동 업데이트 $(date +'%Y-%m-%d %H:%M KST')"
          git push
