name: 🗓️ KAIWAI 캘린더 자동 업데이트

on:
  # ─── 매일 자정 KST 자동 실행 (UTC 15:00 = KST 00:00) ───
  schedule:
    - cron: "0 15 * * *"

  # ─── GitHub Actions 탭에서 수동 실행 버튼 ───
  workflow_dispatch:

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # calendar_data.json 커밋·푸시 권한

    steps:
      # ① 저장소 체크아웃
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ② Python 환경 설정
      - name: 🐍 Python 3.11 세팅
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ③ 의존성 설치
      #    instaloader : Instagram 크롤링 (무료, 로그인 불필요)
      #    requests    : Nitter RSS / Apify HTTP 요청
      - name: 📦 의존성 설치
        run: pip install instaloader requests

      # ④ 스크래퍼 실행
      #    APIFY_TOKEN : Apify 무료 플랜 토큰 (선택)
      #                  GitHub → Settings → Secrets → Actions → New secret
      #                  이름: APIFY_TOKEN, 값: apify_api_xxx...
      - name: 🔍 캘린더 데이터 수집
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python update_calendar.py

      # ⑤ 변경된 JSON만 커밋하고 푸시
      - name: 💾 calendar_data.json 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar_data.json
          # 변경이 없으면 커밋 건너뜀 (에러 방지)
          git diff --staged --quiet \
            || git commit -m "chore: 캘린더 자동 업데이트 $(date +'%Y-%m-%d %H:%M KST')"
          git push
