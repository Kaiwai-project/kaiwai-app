<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>KAIWAI 🎀 — 일본 서브컬쳐 패션 디렉토리</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Gowun+Dodum&family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<!-- 소셜 로그인 전부 Supabase Auth 로 통일 (카카오/구글/네이버 SDK 모두 제거) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js?v=2"></script>
<style>
  /* ══ 산리오 감성 파스텔 디자인 토큰 (마이멜로디 × 쿠로미) ══ */
  :root{
    --bg:#FFF0F5;            /* 아주 연한 파스텔 핑크 */
    --pink:#FFB6C1;          /* 딸기우유 핑크 (포인트) */
    --pink-deep:#FF6FA8;
    --lav:#E6E6FA;           /* 라벤더 퍼플 (포인트) */
    --lav-deep:#B8A1E3;
    --ink:#4A4A4A;           /* 부드러운 차콜 그레이 */
    --card:#FFFFFF;
    --pink-line:#FFC9DD;     /* 카드 점선 테두리 */
    --soft:0 8px 24px rgba(255,182,193,.4);   /* 몽글몽글 소프트 섀도우 */
    --soft-lg:0 16px 34px rgba(255,182,193,.55);
    --jelly:cubic-bezier(.175,.885,.32,1.275); /* 통통 튀는 젤리 커브 */
    --bounce:var(--jelly);
  }
  /* 동글동글 폰트 + 연핑크 깅엄 체크 배경 (은은하게 — 카드 방해 방지) */
  body {
    font-family:'Gowun Dodum','Noto Sans KR',sans-serif;
    color:var(--ink);
    background-color:var(--bg);
    background-image:
      linear-gradient(45deg, rgba(255,182,193,.08) 25%, transparent 25%, transparent 75%, rgba(255,182,193,.08) 75%),
      linear-gradient(45deg, rgba(230,230,250,.10) 25%, transparent 25%, transparent 75%, rgba(230,230,250,.10) 75%);
    background-size:30px 30px;
    background-position:0 0, 15px 15px;
  }
  #app { background:transparent !important; }
  /* 몽글몽글 카드: 둥근 모서리 + 연핑크 점선 + 소프트 섀도우 + 통통 hover */
  .kawaii-card{
    background:var(--card) !important;
    border:2px dashed var(--pink-line) !important;
    border-radius:26px !important;
    box-shadow:var(--soft) !important;
    transition:transform .3s var(--bounce), box-shadow .3s ease, border-color .3s ease !important;
  }
  .kawaii-card:hover{
    transform:translateY(-5px) scale(1.025);
    box-shadow:var(--soft-lg) !important;
    border-color:var(--pink) !important;
  }
  .kawaii-card:active{ transform:scale(.97); }   /* 젤리: 눌리는 촉감 */
  /* 통통 튀는 hover 유틸 */
  .pop{ transition:transform .25s var(--jelly) !important; }
  .pop:hover{ transform:translateY(-3px) scale(1.08); }
  nav button{ transition:transform .25s var(--jelly); }
  nav button:hover{ transform:translateY(-3px) scale(1.12); }
  nav button:active{ transform:scale(.9); }
  /* 젤리 버튼: 모든 버튼/링크에 쫀득한 눌림감 */
  button, a[onclick], a[href]{ transition:transform .3s var(--jelly), filter .15s, opacity .15s, box-shadow .25s; }
  button:active, a[onclick]:active{ transform:scale(.96); }
  /* 로고 컨테이너: 사각 로고가 흰 카드에 묻히지 않게 영역 분리 */
  .logo-wrapper{
    position:relative; flex-shrink:0; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .logo-wrapper img{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:contain; padding:8px; box-sizing:border-box;
    border:1px dashed var(--pink); border-radius:inherit;
    box-shadow:inset 0 0 6px rgba(255,182,193,.25); /* 은은한 이너 섀도우 */
    opacity:0; transition:opacity .25s;
  }
  .logo-font { font-family:'M PLUS Rounded 1c',sans-serif; font-weight:800; }
  .brand-font { font-family:'M PLUS Rounded 1c',sans-serif; font-weight:700; }
  .noscroll::-webkit-scrollbar{display:none}
  .noscroll{-ms-overflow-style:none;scrollbar-width:none}
  .drag{cursor:grab;user-select:none}
  .drag.on{cursor:grabbing}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .fu{animation:fadeUp .36s ease both}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .su{animation:slideUp .32s cubic-bezier(.32,.72,0,1)}
  .clamp2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .masonry{columns:2;column-gap:10px}
  .mitem{break-inside:avoid;margin-bottom:10px}
  a{text-decoration:none}
  .auth-input{width:100%;padding:13px 16px;border:1.5px solid #FFD6E8;border-radius:14px;font-size:14px;color:#4A4A4A;outline:none;font-family:'Noto Sans KR',sans-serif;box-sizing:border-box;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
  .auth-input:focus{border-color:#FF6FA8;box-shadow:0 0 0 3px rgba(255,111,168,.12)}
  .auth-input::placeholder{color:#C4A8B0}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  .shake{animation:shake .32s ease}
  @keyframes likeBounce{0%{transform:scale(1)}20%{transform:scale(1.55)}50%{transform:scale(.88)}70%{transform:scale(1.18)}85%{transform:scale(.96)}100%{transform:scale(1)}}
  .like-bounce{animation:likeBounce .5s cubic-bezier(.36,.07,.19,.97);display:inline-block}

  /* ══ v2 폴리싱 레이어 (접근성·로딩·빈상태·탭바) ══ */
  :root{
    --ink-soft:#8D7B80;     /* 보조 텍스트 */
    --ink-faint:#C4A8B0;    /* 흐린 텍스트/플레이스홀더 */
    --card-soft:#FFF5F8;    /* 연한 카드 배경 */
    --line-soft:#FFE8F0;    /* 연한 구분선 */
    --pink-mid:#FF6FA8;
    --pink-hot:#C41055;
  }
  /* 모바일: 회색 탭 하이라이트 제거 + 부드러운 스크롤·관성 스크롤 */
  *{ -webkit-tap-highlight-color:transparent }
  html{ scroll-behavior:smooth }
  body{ -webkit-overflow-scrolling:touch }
  /* 키보드 접근성: 포커스 링은 키보드 탐색 시에만 (마우스 클릭엔 안 보임) */
  :focus-visible{ outline:2.5px solid var(--pink-mid); outline-offset:2px; border-radius:10px }
  button:focus:not(:focus-visible), a:focus:not(:focus-visible){ outline:none }
  /* 하단 탭바 활성 인디케이터: 핑크 점 통통 + 아이콘 살짝 확대 */
  nav button{ position:relative }
  nav button span:first-child{ transition:transform .25s var(--jelly) }
  nav button::before{
    content:""; position:absolute; top:4px; left:50%;
    width:5px; height:5px; border-radius:50%; background:var(--pink-mid);
    transform:translateX(-50%) scale(0); transition:transform .3s var(--jelly);
  }
  nav button.active::before{ transform:translateX(-50%) scale(1) }
  nav button.active span:first-child{ transform:translateY(-2px) scale(1.08) }
  /* 스켈레톤 시머 (로딩 자리표시) */
  @keyframes shimmer{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .kw-skel{
    background:linear-gradient(100deg,#FFEAF2 30%,#FFD3E5 50%,#FFEAF2 70%);
    background-size:200% 100%; animation:shimmer 1.3s ease-in-out infinite; border-radius:12px;
  }
  /* 빈 상태 이모지: 살랑살랑 플로팅 */
  @keyframes floaty{ 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-7px) rotate(3deg)} }
  .kw-float{ display:inline-block; animation:floaty 2.8s ease-in-out infinite }
  /* 모션 최소화 선호 시: 애니메이션·전환 완화 (멀미/전정장애 배려) */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{
      animation-duration:.001ms !important; animation-iteration-count:1 !important;
      transition-duration:.05ms !important; scroll-behavior:auto !important;
    }
  }
</style>
</head>
<body class="flex justify-center min-h-screen">

<div id="app" class="relative w-full max-w-[430px] min-h-screen flex flex-col">

<!-- ══ 홈 탭 ══ -->
<div id="tHome" class="flex flex-col flex-1">
  <div class="sticky top-0 z-10 px-4 pt-7 pb-3" style="background:linear-gradient(to bottom,#FFF0F5 85%,rgba(255,240,245,0));backdrop-filter:blur(10px)">
    <div class="flex items-end justify-between mb-4">
      <span class="logo-font text-[32px] leading-none pop" onclick="goHome()" title="홈으로" role="button" style="color:#4A4A4A;cursor:pointer;display:inline-block">KAIWAI <span style="color:#FF6FA8">🎀</span></span>
      <button id="authBtn" onclick="openAuth('login')" style="background:#FFF0F5;border:1.5px solid #FFD6E8;border-radius:100px;padding:7px 16px;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif;font-size:12px;font-weight:700;color:#FF6FA8;transition:all .2s" onmouseover="this.style.background='#FFE0EE'" onmouseout="this.style.background='#FFF0F5'">로그인</button>
    </div>
    <div id="filterRow" class="flex gap-2 overflow-x-auto noscroll pb-1 drag"></div>
    <div style="position:relative;margin-top:10px">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;color:#8D7B80">🔍</span>
      <input id="searchBox" type="search" placeholder="브랜드명, 스타일, 키워드로 검색…"
        oninput="setSearch(this.value)"
        style="width:100%;background:#fff;border:1.5px solid #FFD6E8;border-radius:100px;padding:10px 40px 10px 36px;color:#4A4A4A;font-size:13px;outline:none;font-family:'Noto Sans KR',sans-serif;box-sizing:border-box;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;box-shadow:0 2px 12px rgba(255,150,180,.1)"
        onfocus="this.style.borderColor='#FF6FA8';this.style.boxShadow='0 0 0 3px rgba(255,111,168,.15)'"
        onblur="this.style.borderColor='#FFD6E8';this.style.boxShadow='0 2px 12px rgba(255,150,180,.1)'"/>
      <button id="searchClear" onclick="clearSearch()" style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#8D7B80;cursor:pointer;font-size:14px;padding:0;width:26px;height:26px;line-height:1">✕</button>
    </div>
  </div>
  <div id="banner" class="mx-4 mt-1 mb-3 overflow-hidden" style="height:156px;border-radius:24px"></div>
  <p id="homeCountWrap" class="px-4 mb-2 text-xs" style="color:#8D7B80"></p>
  <div id="brandList" class="px-4 pb-28 flex flex-col gap-3"></div>
</div>

<!-- ══ 쇼핑맵 탭 ══ -->
<div id="tMap" style="display:none" class="flex-col flex-1">
  <div class="sticky top-0 z-10 px-4 pt-7 pb-3" style="background:linear-gradient(to bottom,#FFF0F5 85%,rgba(255,240,245,0));backdrop-filter:blur(10px)">
    <div class="flex items-center justify-between mb-4">
      <div><h1 class="font-bold text-lg" style="color:#4A4A4A;font-family:'M PLUS Rounded 1c',sans-serif">🗺️ 쇼핑 맵</h1><p style="color:#8D7B80;font-size:10px">현지 오프라인 매장 가이드</p></div>
      <span style="background:#FFE8F0;color:#8D7B80;font-size:10px;padding:4px 10px;border-radius:10px">면세 ✓ 표시 있음</span>
    </div>
    <div id="regionRow" class="flex gap-2 overflow-x-auto noscroll pb-1 drag"></div>
    <div id="mallRow" class="flex gap-2 overflow-x-auto noscroll mt-2 pb-1 drag"></div>
  </div>
  <p class="px-4 mt-3 mb-2 text-xs" style="color:#8D7B80"><span id="mapBrandCount" style="color:#4A4A4A;font-weight:700"></span> 브랜드 · <span id="mapStoreCount" style="color:#4A4A4A;font-weight:700"></span> 매장</p>
  <div id="mapList" class="px-4 pb-28 flex flex-col gap-3"></div>
</div>

<!-- ══ 피드 탭 ══ -->
<div id="tFeed" style="display:none" class="flex-col flex-1">
  <div class="sticky top-0 z-10 px-4 pt-7 pb-3" style="background:linear-gradient(to bottom,#FFF0F5 85%,rgba(255,240,245,0))">
    <div class="flex items-center justify-between">
      <div><h1 class="font-bold text-lg" style="color:#4A4A4A;font-family:'M PLUS Rounded 1c',sans-serif">📸 스타일 피드</h1><p style="color:#8D7B80;font-size:10px">서브컬쳐 OOTD 모음</p></div>
      <button onclick="openUpload()" style="background:#FFE0EE;color:#C41055;border:1.5px solid #FFB3CC;font-size:11px;font-weight:700;padding:6px 14px;border-radius:100px;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif">+ 업로드</button>
    </div>
  </div>
  <div id="feedGrid" class="px-3 pt-2 pb-28 masonry"></div>
</div>

<!-- ══ 즐겨찾기 탭 ══ -->
<div id="tFav" style="display:none" class="flex-col flex-1">
  <div class="px-4 pt-7 pb-5" style="background:linear-gradient(to bottom,#FFF0F5 60%,transparent)">
    <h1 class="font-bold text-lg" style="color:#4A4A4A;font-family:'M PLUS Rounded 1c',sans-serif">❤️ 즐겨찾기</h1>
    <p style="color:#8D7B80;font-size:10px;margin-top:2px">하트를 누른 브랜드 모음</p>
  </div>
  <div id="favList" class="px-4 pb-28 flex flex-col gap-3"></div>
</div>

<!-- ══ 캘린더 탭 ══ -->
<div id="tCal" style="display:none" class="flex-col flex-1">
  <div class="px-4 pt-7 pb-5" style="background:linear-gradient(to bottom,#FFF0F5 60%,transparent)">
    <h1 class="font-bold text-lg" style="color:#4A4A4A;font-family:'M PLUS Rounded 1c',sans-serif">🗓️ 신상 캘린더</h1>
    <p style="color:#8D7B80;font-size:10px;margin-top:2px">2026년 발매 · 수주 · 팝업 일정</p>
  </div>
  <div id="calList" class="px-4 pb-28 flex flex-col gap-3"></div>
</div>

<!-- ══ 하단 탭바 ══ -->
<nav class="fixed bottom-0 z-20 w-full max-w-[430px] flex" style="background:#fff;border-top:1.5px solid #FFD6E8;box-shadow:0 -4px 20px rgba(255,150,180,.12)">
  <button id="nb-home" onclick="go('home')" class="active flex-1 flex flex-col items-center gap-0.5 py-3" style="font-size:10px;font-weight:700;color:#FF6FA8;border:none;background:none;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif"><span style="font-size:18px">🎀</span>홈</button>
  <button id="nb-map"  onclick="go('map')"  class="flex-1 flex flex-col items-center gap-0.5 py-3" style="font-size:10px;font-weight:600;color:#C4A8B0;border:none;background:none;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif"><span style="font-size:18px">🗺️</span>쇼핑맵</button>
  <button id="nb-feed" onclick="go('feed')" class="flex-1 flex flex-col items-center gap-0.5 py-3" style="font-size:10px;font-weight:600;color:#C4A8B0;border:none;background:none;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif"><span style="font-size:18px">📸</span>피드</button>
  <button id="nb-fav"  onclick="go('fav')"  class="flex-1 flex flex-col items-center gap-0.5 py-3" style="font-size:10px;font-weight:600;color:#C4A8B0;border:none;background:none;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif"><span style="font-size:18px">❤️</span>즐겨찾기</button>
  <button id="nb-cal"  onclick="go('cal')"  class="flex-1 flex flex-col items-center gap-0.5 py-3" style="font-size:10px;font-weight:600;color:#C4A8B0;border:none;background:none;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif"><span style="font-size:18px">🗓️</span>캘린더</button>
</nav>
</div>

<!-- ══ 브랜드 모달 ══ -->
<div id="overlay" onclick="closeModal()" style="display:none;position:fixed;inset:0;background:rgba(74,74,74,.4);z-index:40;align-items:flex-end;justify-content:center">
  <div id="mSheet" onclick="event.stopPropagation()" style="position:relative;width:100%;max-width:430px;background:#fff;border-radius:28px 28px 0 0;overflow-y:auto;max-height:90vh">
    <div id="mBody"></div>
  </div>
</div>

<!-- ══ OOTD 업로드 모달 ══ -->
<div id="uploadOverlay" onclick="closeUpload()" style="display:none;position:fixed;inset:0;background:rgba(74,74,74,.4);z-index:50;align-items:flex-end;justify-content:center">
  <div id="uploadSheet" onclick="event.stopPropagation()" style="position:relative;width:100%;max-width:430px;background:#fff;border-radius:28px 28px 0 0;overflow-y:auto;max-height:92vh">
    <div style="width:44px;height:4px;background:#FFD6E8;border-radius:100px;margin:12px auto 0"></div>
    <button onclick="closeUpload()" style="position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:#FFF0F5;border:none;color:#8D7B80;cursor:pointer;font-size:13px;z-index:10;display:flex;align-items:center;justify-content:center">✕</button>
    <div style="padding:24px 24px 40px">
      <h2 style="font-family:'M PLUS Rounded 1c',sans-serif;font-weight:800;font-size:22px;color:#4A4A4A;margin:8px 0 20px">OOTD 업로드 📸</h2>

      <!-- 사진 첨부 (숨겨진 input + 점선 박스) -->
      <input id="uploadFile" type="file" accept="image/*" style="display:none" onchange="previewUpload(event)"/>
      <div id="uploadDrop" onclick="document.getElementById('uploadFile').click()"
           style="position:relative;width:100%;aspect-ratio:1/1;border:2px dashed #FFB3CC;border-radius:20px;background:#FFF5F8;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:background .2s"
           onmouseover="this.style.background='#FFE0EE'" onmouseout="this.style.background='#FFF5F8'">
        <img id="uploadPreview" alt="미리보기" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover"/>
        <div id="uploadPlaceholder" style="text-align:center;pointer-events:none">
          <div style="font-size:40px;margin-bottom:8px">🎀</div>
          <p style="font-size:13px;font-weight:700;color:#C41055;font-family:'M PLUS Rounded 1c',sans-serif">사진을 첨부해 주세요</p>
          <p style="font-size:11px;color:#C4A8B0;margin-top:4px">탭해서 갤러리에서 선택</p>
        </div>
      </div>

      <!-- 코디 설명 / 해시태그 -->
      <textarea id="uploadCaption" rows="3" placeholder="오늘의 코디를 설명해 주세요 ✨  #지뢰계 #양산형"
        style="width:100%;margin-top:16px;padding:13px 16px;border:1.5px solid #FFD6E8;border-radius:14px;font-size:14px;color:#4A4A4A;outline:none;font-family:'Noto Sans KR',sans-serif;box-sizing:border-box;resize:none;line-height:1.6;transition:border-color .2s,box-shadow .2s"
        onfocus="this.style.borderColor='#FF6FA8';this.style.boxShadow='0 0 0 3px rgba(255,111,168,.12)'"
        onblur="this.style.borderColor='#FFD6E8';this.style.boxShadow='none'"></textarea>

      <!-- 완료 -->
      <button id="uploadSubmitBtn" onclick="submitPost()"
        style="width:100%;margin-top:18px;padding:15px;border:none;border-radius:16px;cursor:pointer;color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-weight:800;font-size:15px;background:linear-gradient(135deg,#FF6FA8,#C41055);box-shadow:0 14px 26px -12px rgba(196,16,85,.9);transition:filter .15s"
        onmouseover="this.style.filter='brightness(1.05)'" onmouseout="this.style.filter='none'">피드에 공유하기</button>
    </div>
  </div>

let CAL = [];

async function loadCal() {
  const el = document.getElementById("calList");
  if (el) el.innerHTML = `<div style="text-align:center;padding:64px 20px"><div style="font-size:36px;margin-bottom:10px">⏳</div><p style="font-size:13px;color:#C4A8B0;font-family:'M PLUS Rounded 1c',sans-serif">일정 불러오는 중…</p></div>`;
  try {
    const res = await fetch("calendar_data.json", { cache: "no-cache" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    CAL = await res.json();
  } catch (e) {
    console.warn("캘린더 데이터 로드 실패:", e.message);
    CAL = [];
  }
  if (document.getElementById("tCal").style.display !== "none") drawCal();
}

function go(t) {

  Object.entries(TABS).forEach(([k,id])=>{
    const el = document.getElementById(id);
    if(k===t){ el.style.display="flex"; el.style.flexDirection="column"; }
    else el.style.display="none";
  });
  Object.entries(NAVS).forEach(([k,id])=>{
    const nb=document.getElementById(id);
    nb.style.color = k===t ? "#FF6FA8" : "#C4A8B0";
    nb.classList.toggle("active", k===t);
  });
  if(t==="map")  drawMap();
  if(t==="feed") loadFeed();
  if(t==="fav")  drawFav();
  if(t==="cal")  drawCal();
}

/* ═══════════════════════════════════
   드래그 스크롤
═══════════════════════════════════ */
function drag(el) {
  let down=false, sx, sl;
  el.addEventListener("mousedown",e=>{down=true;el.classList.add("on");sx=e.pageX-el.offsetLeft;sl=el.scrollLeft;});
  el.addEventListener("mouseleave",()=>{down=false;el.classList.remove("on");});
  el.addEventListener("mouseup",()=>{down=false;el.classList.remove("on");});
  el.addEventListener("mousemove",e=>{if(!down)return;e.preventDefault();el.scrollLeft=sl-(e.pageX-el.offsetLeft-sx)*1.2;});
}

function drawFilter() {

  row.innerHTML = FILTERS.map(f=>{
    const m = CM[f], act = f===filt;
    const bg     = act ? m.c : "#fff";
    const col    = act ? "#fff" : "#8D7B80";
    const border = act ? `1.5px solid ${m.c}` : "1.5px solid #FFD6E8";
    const sh     = act ? `0 4px 14px ${m.c}44` : "0 2px 8px rgba(255,150,180,.1)";
    return `<button onclick="setFilt('${f}')" style="flex-shrink:0;padding:8px 15px;border-radius:100px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;background:${bg};color:${col};border:${border};box-shadow:${sh};font-family:'M PLUS Rounded 1c',sans-serif">${m.e} ${f}</button>`;
  }).join("");
  drag(row);
}

/* 카테고리별 카드 배경 무드 (Tailwind 팔레트 값 그대로 사용).
   dark=true 인 카테고리는 어두운 배경 + 밝은 글자로 렌더링.
   .kawaii-card 의 background !important 를 이기려고 인라인에 !important 로 입힌다. */
const CARD_THEME = {
  "양산형":               { bg:"#FDF2F8", dark:false }, // bg-pink-50

/* 카테고리별 반투명 반복 문양 — 이제는 '모달 배경' 전용 (브랜드 카드는 이미지 배경 사용).
   모달 위에서 텍스트를 방해하지 않게 크게 + 사선(half-drop) + 아주 옅게 깐다. */
function _rgba(hex, a){ const n = parseInt(hex.slice(1), 16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function _svgUrl(inner, color, alpha, vb){
  const c = _rgba(color, alpha), p = vb.split(" ");
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${p[2]}' height='${p[3]}' viewBox='${vb}'>${inner.replace(/COLOR/g, c)}</svg>`;
  return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
}
function _svgPat(inner, color, alpha, vb, sizeCss){
  return `background-image:${_svgUrl(inner, color, alpha, vb)};background-repeat:repeat;background-size:${sizeCss}`;
}
/* motif(0~24 좌표)를 48 타일의 두 대각 위치에 배치 → 반복 시 사선(대각) 배열 */
function _diagSvg(motif, color, alpha){
  const m = motif.replace(/COLOR/g, _rgba(color, alpha));
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 48 48'><g transform='translate(0,0)'>${m}</g><g transform='translate(24,24)'>${m}</g></svg>`;
  return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
}
function _svgDiag(motif, color, alpha, sizeCss){
  return `background-image:${_diagSvg(motif, color, alpha)};background-repeat:repeat;background-size:${sizeCss}`;
}
const CAT_PATTERN = (function(){

  // 비쥬얼계 고스·펑크 — 해골 (3~4배 크게, 사선)
  P["비쥬얼계 고스·펑크"] = _svgDiag("<path fill='COLOR' d='M12 4a6 6 0 00-6 6c0 2.1 1.1 3.9 2.7 5V17h1.6v-1.4h3.4V17H15v-2c1.6-1.1 2.7-2.9 2.7-5a6 6 0 00-6-6zM9.4 11.2a1.4 1.4 0 110-2.8 1.4 1.4 0 010 2.8zm5.2 0a1.4 1.4 0 110-2.8 1.4 1.4 0 010 2.8z'/>", "#7E22CE", .12, "180px 180px");
  // 스나계 — 다이아몬드 퀼팅 유지 (텍스트 위해 약간 옅게)
  P["스나계"] = "background-image:repeating-linear-gradient(45deg," + _rgba("#9A7B4F", .3) + " 0 1px,transparent 1px 22px),repeating-linear-gradient(-45deg," + _rgba("#9A7B4F", .3) + " 0 1px,transparent 1px 22px)";
  // 로리타 — 다마스크(3~4배 크게, 사선) + 위·아래 레이스 테두리
  (function(){
    const damask = _diagSvg("<path fill='COLOR' d='M12 3c1.6 1.8 1.6 3.8 0 5.6-1.6-1.8-1.6-3.8 0-5.6z'/><path fill='COLOR' d='M12 9c2.4 2.8 5.6 3.4 8.4 2-1.8 2.2-4.6 2.4-8.4 4.6-3.8-2.2-6.6-2.4-8.4-4.6 2.8 1.4 6 .8 8.4-2z'/><path fill='COLOR' d='M12 16c1.2 1.4 1.2 3 0 4.6-1.2-1.6-1.2-3.2 0-4.6z'/>", "#A21CAF", .12, "170px 170px");
    const laceT = "radial-gradient(circle at 9px 0," + _rgba("#A21CAF", .3) + " 0 5px,transparent 6px)";
    const laceB = "radial-gradient(circle at 9px 100%," + _rgba("#A21CAF", .3) + " 0 5px,transparent 6px)";
    P["로리타"] = `background-image:${damask},${laceT},${laceB};background-repeat:repeat,repeat-x,repeat-x;background-size:170px 170px,18px 18px,18px 18px;background-position:center,top,bottom`;
  })();
  // 잡화 — 물결 라인 유지 (채도 낮은 브라운)
  P["잡화(가방,신발,악세)"] = _svgPat("<path fill='none' stroke='COLOR' stroke-width='1.8' d='M0 6q6-6 12 0t12 0'/>", "#7C5A3A", .36, "0 0 24 12", "30px 15px");
  return P;

/* CSS 선언 문자열을 element.style 에 그대로 적용 (모달 배경에 패턴 재사용) */

/* XSS 방지: 유저 입력(caption/닉네임)을 innerHTML 에 넣기 전 이스케이프 */
function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* posts 공개 뷰에서 최신순으로 불러와 FEED 채우고 렌더 */
async function loadFeed(){
  const grid=document.getElementById("feedGrid");
  if(!grid) return;
  if(!window.sb){ grid.innerHTML=_feedMsg("피드를 불러올 수 없어요"); return; }
  grid.innerHTML=_feedSkeleton();
  await fetchMyLikes();                 // 내가 누른 하트 동기화 (하트 색상용)
  const { data, error } = await window.sb
    .from("public_feed").select("*").order("created_at",{ascending:false}).limit(50);
  if(error){ console.warn("피드 조회 실패:", error.message); grid.innerHTML=_feedMsg("피드를 불러오지 못했어요 😢"); return; }
  FEED = data || [];
  drawFeed();
}

/* 좋아요 UI 갱신 (피드 카드 + 열려있는 상세 모달) */
function _updateLikeUI(postId){
  const p=FEED.find(x=>x.id===postId); if(!p) return;
  const el=document.getElementById("like-"+postId);
  if(el) el.outerHTML=_likeBtnHtml(p);            // 같은 id 유지
  if(_detailPostId===postId){
    const d=document.getElementById("detailLikeBtn");
    if(d) d.innerHTML=`${myLikes.has(postId)?"❤️":"🤍"} ${(p.like_count||0).toLocaleString()}`;

/* 내가 누른 좋아요 목록 동기화 */
async function fetchMyLikes(){
  myLikes=new Set();
  if(!window.sb) return;
  const { data:{ session } } = await window.sb.auth.getSession();
  if(!session){ currentUserId=null; return; }
  currentUserId=session.user.id;
  const { data, error } = await window.sb.from("post_likes").select("post_id").eq("user_id",session.user.id);
  if(error){ console.warn("내 좋아요 조회 실패:", error.message); return; }
  myLikes=new Set((data||[]).map(r=>r.post_id));
}

/* 좋아요 토글 (낙관적 UI + post_likes insert/delete) */
async function togglePostLike(postId){
  const { data:{ session } } = await window.sb.auth.getSession();
  if(!session){ showToast('로그인이 필요해요 🎀'); openAuth('login'); return; }
  const uid=session.user.id;
  const p=FEED.find(x=>x.id===postId); if(!p) return;
  const liked=myLikes.has(postId);

  // 낙관적 업데이트
  if(liked){ myLikes.delete(postId); p.like_count=Math.max(0,(p.like_count||0)-1); }
  else     { myLikes.add(postId);    p.like_count=(p.like_count||0)+1; }
  _updateLikeUI(postId);

  // DB 통신
  const { error } = liked
    ? await window.sb.from("post_likes").delete().eq("post_id",postId).eq("user_id",uid)
    : await window.sb.from("post_likes").insert({ post_id:postId, user_id:uid });

  // 실패 시 롤백
  if(error){
    if(liked){ myLikes.add(postId); p.like_count=(p.like_count||0)+1; }
    else     { myLikes.delete(postId); p.like_count=Math.max(0,(p.like_count||0)-1); }
    _updateLikeUI(postId);
    showToast('오류가 발생했어요. 다시 시도해 주세요.');
    console.warn("post_likes 통신 실패:", error.message);
  }
}

/* 실시간: 다른 유저의 좋아요 변경을 구독해 카운트 즉시 반영 */
let _likesChannel=null;
function subscribePostLikes(){
  if(!window.sb || _likesChannel) return;
  _likesChannel=window.sb.channel("realtime:post_likes")
    .on("postgres_changes", { event:"*", schema:"public", table:"post_likes" }, (payload)=>{
      const row=(payload.new && Object.keys(payload.new).length) ? payload.new : payload.old;
      if(!row) return;
      if(row.user_id===currentUserId) return;     // 내 액션은 이미 낙관적 반영됨
      const p=FEED.find(x=>x.id===row.post_id);
      if(!p) return;
      if(payload.eventType==="INSERT") p.like_count=(p.like_count||0)+1;
      else if(payload.eventType==="DELETE") p.like_count=Math.max(0,(p.like_count||0)-1);
      _updateLikeUI(row.post_id);
    })
    .subscribe();
}

async function savePostEdit(){

/* 공개 URL → 스토리지 객체 경로(uid/파일명) 추출 */
function _storagePathFromUrl(url){
  const marker="/storage/v1/object/public/posts/";
  const i=String(url||"").indexOf(marker);
  return i===-1 ? null : url.slice(i+marker.length);
}

async function deletePost(){
  const p=FEED.find(x=>x.id===_detailPostId); if(!p) return;
  if(!confirm("이 게시물을 삭제할까요? 되돌릴 수 없어요.")) return;
  // 1) posts 행 삭제 (RLS: 본인 글만)
  const { error } = await window.sb.from("posts").delete().eq("id",p.id);
  if(error){ showToast('삭제에 실패했어요. 다시 시도해 주세요.'); console.error("posts delete 실패:", error); return; }
  // 2) 스토리지 이미지 삭제 (best-effort)
  try{
    const paths=(p.image_urls||[]).map(_storagePathFromUrl).filter(Boolean);
    if(paths.length) await window.sb.storage.from("posts").remove(paths);
  }catch(e){ console.warn("이미지 삭제 경고:", e); }
  closePostDetail();
  showToast('게시물이 삭제됐어요.');
  loadFeed();
}

/* ═══════════════════════════════════

function _enc(pw){ try{ return btoa(unescape(encodeURIComponent(pw))); }catch(e){ return btoa(pw); } }

async function openUpload(){
  // 인증 가드 (캐시된 authUser → 없으면 Supabase 세션 확인)
  let loggedIn = !!authUser;
  if(!loggedIn && window.sb){
    const { data:{ session } } = await window.sb.auth.getSession();
    loggedIn = !!session;
  }
  if(!loggedIn){
    showToast('로그인이 필요해요 🎀');
    openAuth('login');
    return;
  }
  _resetUpload();
  const ov=document.getElementById("uploadOverlay"), sh=document.getElementById("uploadSheet");
  ov.style.display="flex";
  sh.classList.remove("su"); void sh.offsetWidth; sh.classList.add("su");  // 슬라이드업
}
function closeUpload(){ document.getElementById("uploadOverlay").style.display="none"; }

function _resetUpload(){
  const f=document.getElementById("uploadFile");
  const img=document.getElementById("uploadPreview");
  const ph=document.getElementById("uploadPlaceholder");
  const cap=document.getElementById("uploadCaption");
  if(f) f.value="";
  if(img){ img.src=""; img.style.display="none"; }
  if(ph) ph.style.display="block";
  if(cap) cap.value="";
}

/* 사진 선택 시 썸네일 미리보기 (FileReader) */
function previewUpload(e){
  const file=e.target.files && e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const img=document.getElementById("uploadPreview");
    const ph=document.getElementById("uploadPlaceholder");
    img.src=ev.target.result;
    img.style.display="block";
    ph.style.display="none";
  };
  reader.readAsDataURL(file);
}

/* 피드에 공유 — Storage 업로드 + posts insert */
/* profiles 행 보장 — 없으면 본인 id 로 보충 생성 (FK 위반 방어).
   13_profiles_insert_policy 의 self-insert 정책이 있어야 동작. */
async function ensureProfile(user){
  if(!user || !window.sb) return;
  const { data: prof } = await window.sb.from("profiles").select("id").eq("id", user.id).maybeSingle();
  if(prof) return;  // 이미 존재 (트리거가 생성한 정상 케이스)
  const meta = user.user_metadata || {};
  const uname = "user_" + user.id.replace(/-/g,"").slice(0,12);
  const { error } = await window.sb.from("profiles").insert({
    id: user.id,
    username: uname,
    display_name: null,  // UNIQUE 인덱스 충돌 회피 — 닉네임은 마이페이지에서 별도 설정
    avatar_url: meta.avatar_url || meta.picture || meta.profile_image || null,
  });
  // 23505 = 동시 생성 경합(이미 존재) → 무시하고 진행
  if(error && error.code !== "23505") throw error;
}

async function submitPost(){
  const fileInput=document.getElementById("uploadFile");
  const file=fileInput && fileInput.files && fileInput.files[0];
  if(!file){ showToast('사진을 먼저 선택해 주세요! 🎀'); return; }

  // 글자 수 검증 (공백 제외 10자보다 길게)
  if(document.getElementById("uploadCaption").value.replace(/\s/g,"").length <= 10){
    showToast('코디에 대한 설명을 10자보다 길게 적어주세요! 🎀');
    return;
  }

  // 로그인 확인
  const { data:{ session } } = await window.sb.auth.getSession();
  if(!session){ showToast('로그인이 필요해요 🎀'); openAuth('login'); return; }
  const userId=session.user.id;

  const btn=document.getElementById("uploadSubmitBtn");
  if(btn){ btn.disabled=true; btn.style.filter="grayscale(.3)"; btn.textContent="업로드 중…"; }

  try{
    // 0) profiles 행 보장 — 가입 트리거 이전 계정은 프로필이 없어 posts.author_id FK 위반 가능.
    //    display_name 은 UNIQUE 인덱스 충돌을 피하려 null 로 두고(닉네임은 마이페이지에서 설정),
    //    username 은 트리거 폴백과 동일한 결정적 값(user_+uid 12자리)으로 형식·유일성 충족.
    await ensureProfile(session.user);

    // 1) Storage 업로드 — 경로는 uid/타임스탬프.확장자 (RLS 폴더 규칙: 첫 폴더 = uid)
    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=`${userId}/${Date.now()}.${ext}`;
    const { error: upErr } = await window.sb.storage.from("posts")
      .upload(path, file, { contentType:file.type, cacheControl:"3600", upsert:false });
    if(upErr) throw upErr;

    // 2) Public URL
    const { data: pub } = window.sb.storage.from("posts").getPublicUrl(path);
    const imageUrl = pub.publicUrl;

    // 3) posts insert (실제 컬럼: author_id, caption, image_urls[])
    const caption=document.getElementById("uploadCaption").value.trim();
    const { error: insErr } = await window.sb.from("posts").insert({
      author_id: userId,
      caption: caption || null,
      image_urls: [imageUrl],            // text[] (1~10장) — 현재 1장
    });
    if(insErr) throw insErr;

    // 4) 성공 → 모달 닫고 폼 초기화 + 피드 갱신(내 글이 맨 위)
    closeUpload();
    _resetUpload();
    showToast('OOTD가 업로드되었어요! 📸');
    loadFeed();
  }catch(e){
    console.error("업로드 실패:", e);
    showToast('업로드에 실패했어요. 다시 시도해 주세요.');
  }finally{
    if(btn){ btn.disabled=false; btn.style.filter="none"; btn.textContent="피드에 공유하기"; }
  }
}

function switchAuth(v){
  ["Login","Signup","Profile"].forEach(n=>{
    document.getElementById("view"+n).style.display = n.toLowerCase()===v ? "block":"none";
  });
  if(v==="profile" && authUser){
    const _av = document.getElementById("profAvatar");
    if(authUser.profileImg){
      _av.innerHTML = `<img src="${authUser.profileImg}" alt="프로필" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
    } else {
      _av.textContent = authUser.nickname[0].toUpperCase();
    }
    document.getElementById("profNick").textContent = authUser.nickname;
    document.getElementById("profSub").textContent = authUser.provider
      ? {kakao:"카카오 계정",naver:"네이버 계정",google:"Google 계정"}[authUser.provider]||authUser.provider
      : "@"+(authUser.id||authUser.email||"");
    document.getElementById("profFavCount").textContent = favs.length+"개 브랜드 저장 중";
  }
}

}

function _showErr(id,msg){
  const el=document.getElementById(id); el.textContent=msg; el.style.display="block";
  const sh=document.getElementById("authSheet");
  sh.classList.remove("shake"); void sh.offsetWidth; sh.classList.add("shake");
}
function _hideErr(id){ document.getElementById(id).style.display="none"; }

function doLogin(){
  const id=document.getElementById("loginId").value.trim();
  const pw=document.getElementById("loginPw").value;
  _hideErr("loginErr");
  if(!id||!pw) return _showErr("loginErr","아이디와 비밀번호를 입력해주세요.");
  const user=_getUsers().find(u=>(u.id===id||u.email===id) && u.pw===_enc(pw));
  if(!user) return _showErr("loginErr","아이디 또는 비밀번호가 일치하지 않아요.");
  authUser={id:user.id,email:user.email,nickname:user.nickname};
  localStorage.setItem("kaiwai_user",JSON.stringify(authUser));
  updateAuthBtn(); closeAuth();
  showToast(`${authUser.nickname}님, 환영해요! 🎀`);
}

function doRegister(){
  const nick=document.getElementById("regNick").value.trim();
  const id=document.getElementById("regId").value.trim();
  const email=document.getElementById("regEmail").value.trim();
  const pw=document.getElementById("regPw").value;
  const pw2=document.getElementById("regPw2").value;
  _hideErr("regErr");
  if(!nick||!id||!email||!pw||!pw2) return _showErr("regErr","모든 항목을 입력해주세요.");
  if(nick.length<2) return _showErr("regErr","닉네임은 2자 이상이어야 해요.");
  // 관리자 사칭 방지: 금지어 포함 시 차단 (대소문자 무시)
  const BANNED_NICK = ['운영','운영자','관리','관리자','admin','master','kaiwai','카이와이'];
  const lowNick = nick.toLowerCase();
  if(BANNED_NICK.some(w => lowNick.includes(w.toLowerCase())))
    return _showErr("regErr","관리자 사칭이 우려되는 닉네임은 사용할 수 없어요 🎀");
  if(!/^[a-zA-Z0-9]{4,20}$/.test(id)) return _showErr("regErr","아이디는 영문·숫자 조합 4~20자로 입력해주세요.");
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return _showErr("regErr","올바른 이메일 주소를 입력해주세요.");
  if(pw.length<8) return _showErr("regErr","비밀번호는 8자 이상이어야 해요.");
  if(pw!==pw2) return _showErr("regErr","비밀번호가 일치하지 않아요.");
  const users=_getUsers();
  if(users.find(u=>u.id===id)) return _showErr("regErr","이미 사용 중인 아이디예요.");
  if(users.find(u=>u.email===email)) return _showErr("regErr","이미 사용 중인 이메일이에요.");
  const newUser={id,email,pw:_enc(pw),nickname:nick};
  users.push(newUser); _saveUsers(users);
  authUser={id,email,nickname:nick};
  localStorage.setItem("kaiwai_user",JSON.stringify(authUser));
  updateAuthBtn(); closeAuth();
  showToast(`${nick}님, 가입을 축하해요! 🎀`);
}

function socialLogin(provider){
  // 카카오/구글/네이버 모두 Supabase Auth 로 통일 (auth.js)
  if(provider==="kakao"){ startKakaoLogin(); return; }
  if(provider==="naver"){ startNaverLogin(); return; }
  if(provider==="google"){ startGoogleLogin(); return; }
}

function doLogout(){
  // 소셜 로그인(카카오/구글/네이버)은 Supabase 세션 종료
  if(["kakao","google","naver"].includes(authUser?.provider) && window.sb){
    try{ window.sb.auth.signOut(); }catch(e){}
  }
  authUser=null; localStorage.removeItem("kaiwai_user");
  updateAuthBtn(); closeAuth();
  showToast("로그아웃 됐어요.");
}

/* 회원탈퇴 — 2단계 확인 후 처리.
   소셜 세션이면 delete-account Edge Function(service_role)으로 auth.users 삭제
   → profiles ON DELETE CASCADE 로 posts/좋아요/팔로우/즐겨찾기·Storage 이미지 정리.
   로컬(localStorage) 계정은 서버에 없으므로 로컬 정리만 수행. */
async function deleteAccount(){
  // Step 1
  if(!confirm("정말로 KAIWAI를 떠나시겠어요? 😢 저장된 OOTD와 즐겨찾기가 모두 삭제됩니다.")) return;
  // Step 2
  if(!confirm("탈퇴 후에는 데이터를 복구할 수 없습니다. 정말 탈퇴하시겠습니까?")) return;

  // 서버 세션 여부 확인 (소셜 로그인 등 Supabase 세션)
  let session=null;
  try{
    if(window.sb) ({ data:{ session } } = await window.sb.auth.getSession());
  }catch(e){ console.warn("세션 조회 경고:", e?.message||e); }

  if(session){
    // 서버 계정: Edge Function 으로 실제 삭제
    try{
      const { data, error } = await window.sb.functions.invoke("delete-account");
      if(error) throw error;
      if(data?.error) throw new Error(data.error + (data.detail ? " / "+data.detail : ""));
    }catch(e){
      console.error("회원탈퇴 실패:", e);
      showToast('회원탈퇴 처리에 실패했어요. 잠시 후 다시 시도해 주세요.');
      return;
    }
    try{ await window.sb.auth.signOut(); }catch(e){ console.warn("signOut 경고:", e); }
  }

  // 로컬 상태 정리 (서버/로컬 계정 공통)
  authUser=null; currentUserId=null;
  localStorage.removeItem("kaiwai_user");
  localStorage.removeItem("zp_fav");
  favs=[]; myLikes=new Set();
  updateAuthBtn(); closeAuth(); drawBrands();
  if(tab==="fav") drawFav();
  showToast('회원탈퇴가 완료되었습니다. 그동안 감사했어요 🎀');
}

function showToast(msg){
  let t=document.getElementById("kaiwaiToast");
  if(!t){
    t=document.createElement("div"); t.id="kaiwaiToast";
    t.style.cssText="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(74,74,74,.92);color:#fff;font-size:13px;font-weight:600;padding:11px 22px;border-radius:100px;z-index:100;white-space:nowrap;font-family:'M PLUS Rounded 1c',sans-serif;box-shadow:0 4px 20px rgba(0,0,0,.18);transition:opacity .35s;pointer-events:none";
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity="1";
  clearTimeout(t._to); t._to=setTimeout(()=>{ t.style.opacity="0"; },2400);
}

/* ═══════════════════════════════════
   좋아요(찜) 시스템 — Mock DB
   초기값: id 기반 일관된 의사난수 (100~5000)
   증감: localStorage kaiwai_likes 에 delta 저장
═══════════════════════════════════ */
function _mockBase(id){ return ((id*7919+2345)%4901)+100; }
function _likeDelta(){ return JSON.parse(localStorage.getItem("kaiwai_likes")||"{}"); }
function getBrandLikes(id){ return _mockBase(id)+(_likeDelta()[id]||0); }
function _setLikeDelta(id,d){
  const m=_likeDelta(); m[id]=(m[id]||0)+d;
  localStorage.setItem("kaiwai_likes",JSON.stringify(m));
}
function _animLike(elId){
  const el=document.getElementById(elId);
  if(!el) return;
  el.classList.remove("like-bounce"); void el.offsetWidth; el.classList.add("like-bounce");
}

/* ═══════════════════════════════════
   즐겨찾기 토글
═══════════════════════════════════ */
async function tFav(id){
  if(!window.sb){ showToast('로그인이 필요합니다 🎀'); return; }

  // 1) 로그인 체크 (가장 중요)
  const { data:{ session } } = await window.sb.auth.getSession();
  if(!session){
    showToast('로그인이 필요합니다 🎀');
    openAuth('login');
    return;
  }
  const userId = session.user.id;

  // 2) 낙관적 UI 업데이트 (DB 응답 기다리지 않고 즉시 반영)
  const i=favs.indexOf(id);
  const adding=i===-1;
  if(adding) favs.push(id); else favs.splice(i,1);
  localStorage.setItem("zp_fav",JSON.stringify(favs));
  _setLikeDelta(id, adding ? 1 : -1);
  drawBrands();
  if(tab==="fav") drawFav();
  if(tab==="map") drawMap();
  updMFav(id);                                   // 맵 상세 시트 하트/카운트 갱신
  if(adding){ requestAnimationFrame(()=>{ _animLike("lk-"+id); }); }

  // 3) Supabase 통신 (insert / delete)
  const { error } = adding
    ? await window.sb.from("user_favorites").insert({ user_id:userId, brand_id:id })
    : await window.sb.from("user_favorites").delete().eq("user_id",userId).eq("brand_id",id);

  // 4) 에러 시 낙관적 업데이트 롤백
  if(error){
    const j=favs.indexOf(id);
    if(adding){ if(j!==-1) favs.splice(j,1); }   // 추가 취소
    else      { if(j===-1) favs.push(id); }      // 삭제 취소
    localStorage.setItem("zp_fav",JSON.stringify(favs));
    _setLikeDelta(id, adding ? -1 : 1);          // 카운트도 원복
    drawBrands();
    if(tab==="fav") drawFav();
    if(tab==="map") drawMap();
    updMFav(id);
    showToast('오류가 발생했어요. 다시 시도해 주세요.');
    console.warn("user_favorites 통신 실패:", error.message);
  }
}

/* 로그인 직후/앱 시작 시: 내 즐겨찾기를 DB → favs 배열로 동기화 */

/* ═══════════════════════════════════
   Supabase 세션 → authUser 브리지
   네이버(리다이렉트) 로그인으로 확립된 Supabase 세션을 기존 UI에 반영.
   카카오/구글/이메일(localStorage mock)은 기존 그대로 동작.
═══════════════════════════════════ */
/* 현재 세션의 로그인 플랫폼 판별 — profile.js 와 동일 로직.
   app_metadata.provider 는 계정 병합 시 첫 가입값으로 고정되므로,
   identities 의 가장 최근 last_sign_in_at 을 우선 사용한다. */
function detectLoginProvider(user){
  const ids = Array.isArray(user?.identities) ? user.identities : [];
  if(ids.length){
    const latest = ids.reduce((a,b)=>
      new Date(b?.last_sign_in_at||0) >= new Date(a?.last_sign_in_at||0) ? b : a);
    const p = (latest?.provider||"").toLowerCase();
    if(p==="kakao"||p==="google"||p==="naver") return p;
    if(p==="email" && user?.user_metadata?.provider==="naver") return "naver"; // 우리 네이버
  }
  const ap = (user?.app_metadata?.provider||"").toLowerCase();
  if(ap==="kakao"||ap==="google"||ap==="naver") return ap;
  if(user?.user_metadata?.provider==="naver") return "naver";
  return "email";
}

/* 마이페이지(profile.js)와 동일한 디폴트 아바타 — 같은 시드(user.id)면 같은 이미지 */
function kawaiiAvatar(seed){
  return `https://api.dicebear.com/9.x/fun-emoji/svg?seed=${encodeURIComponent(seed)}&backgroundColor=ffd6e8,ffc0cb,ffe0ee,fbb1d3&radius=50`;
}

async function initSupabaseAuth(){
  if(!window.sb) return;  // auth.js 미로드 시 무시
  try{
    const { data:{ user } } = await window.sb.auth.getUser();
    if(user){
      const m = user.user_metadata || {};
      // provider: 가장 최근 로그인한 identity 기준 (계정 병합돼도 정확)
      const provider = detectLoginProvider(user);
      // profiles 에서 카이와이 닉네임/아바타 조회 (마이페이지와 동일 소스)
      let displayName = "", avatarUrl = "";
      try {
        const { data: prof } = await window.sb
          .from("profiles").select("display_name, avatar_url").eq("id", user.id).maybeSingle();
        displayName = prof?.display_name?.trim() || "";
        avatarUrl   = prof?.avatar_url?.trim() || "";
      } catch(_){ /* 조회 실패 시 메타데이터/디폴트로 폴백 */ }
      authUser = {
        id: user.id,
        email: user.email,
        nickname: displayName
                  || m.full_name || m.name || m.user_name || m.nickname
                  || (user.email||"").split("@")[0] || "사용자",
        // 아바타: DB avatar_url 우선 → 없으면 마이페이지와 같은 DiceBear
        profileImg: avatarUrl || kawaiiAvatar(user.id),
        provider,
      };
      localStorage.setItem("kaiwai_user", JSON.stringify(authUser));
      updateAuthBtn();
      currentUserId = user.id;              // realtime 자기 액션 구분용
      fetchUserFavorites();                 // 로그인 상태 → DB 즐겨찾기 동기화
    }
    // 다른 탭/콜백에서의 로그인·로그아웃 동기화 (소셜 전체)
    window.sb.auth.onAuthStateChange((event)=>{
      if(event==="SIGNED_OUT" && ["kakao","google","naver"].includes(authUser?.provider)){
        authUser=null; localStorage.removeItem("kaiwai_user"); updateAuthBtn();
        favs=[]; localStorage.setItem("zp_fav","[]");   // 로그아웃 시 즐겨찾기 비우기
        drawBrands(); if(tab==="fav") drawFav();
      }
    });
  }catch(e){ /* 세션 없음 — 무시 */ }
}
