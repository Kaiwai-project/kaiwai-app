<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 2080" font-family="'Malgun Gothic','Pretendard','Apple SD Gothic Neo',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8D7B80"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D6437A"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A9E5E"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#C41055" flood-opacity="0.16"/>
    </filter>
    <style>
      .rider{fill:#fff;stroke:#E8608D;stroke-width:2}
      .host{fill:#fff;stroke:#2D6FE0;stroke-width:2}
      .srv{fill:#2B2330;stroke:#2B2330}
      .db{fill:#F4EEF2;stroke:#B6AAB0;stroke-width:2}
      .t{font-size:14px;fill:#3A2B30;font-weight:700}
      .ts{font-size:11.5px;fill:#8D7B80;font-weight:600}
      .tw{font-size:14px;fill:#fff;font-weight:800}
      .tws{font-size:11px;fill:#E7D9E2;font-weight:600}
      .ph{font-size:20px;fill:#D6437A;font-weight:800}
      .lane{font-size:16px;font-weight:800}
      .edge{stroke:#8D7B80;stroke-width:1.8;fill:none;marker-end:url(#arr)}
      .edgeP{stroke:#D6437A;stroke-width:2.2;fill:none;marker-end:url(#arrP)}
      .edgeG{stroke:#1A9E5E;stroke-width:2.2;fill:none;marker-end:url(#arrG)}
      .guard{font-size:10.5px;fill:#E5484D;font-weight:800}
    </style>
  </defs>

  <rect width="1480" height="2080" fill="#FFF7FB"/>

  <!-- ── Title ── -->
  <text x="50" y="56" font-size="30" font-weight="800" fill="#D6437A">🚌 KAIWAI 안심 공구 작동 원리</text>
  <text x="52" y="84" class="ts" font-size="13">먹튀 0% · 잠수 0% — 서버가 돈·정합성을 강제로 지키는 공동구매 흐름  ·  핑크=참여자 / 파랑=총대 / 검정=서버RPC·트리거 / 회색=DB</text>

  <!-- ── Lane headers ── -->
  <rect x="50" y="104" width="420" height="34" rx="10" fill="#FFE3EF"/>
  <text x="260" y="127" text-anchor="middle" class="lane" fill="#D6437A">🙋 참여자 (Rider)</text>
  <rect x="530" y="104" width="420" height="34" rx="10" fill="#2B2330"/>
  <text x="740" y="127" text-anchor="middle" class="lane" fill="#fff">⚙️ 서버 (RPC · 트리거 · RLS) + DB</text>
  <rect x="1010" y="104" width="420" height="34" rx="10" fill="#E1ECFF"/>
  <text x="1220" y="127" text-anchor="middle" class="lane" fill="#2D6FE0">👑 총대 (Host)</text>

  <!-- lane divider guides -->
  <line x1="500" y1="150" x2="500" y2="1620" stroke="#F0D9E4" stroke-width="1.5" stroke-dasharray="4 6"/>
  <line x1="980" y1="150" x2="980" y2="1620" stroke="#F0D9E4" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- ════════ PHASE 1 : 개설 ════════ -->
  <text x="50" y="180" class="ph">① 공구 개설</text>
  <line x1="50" y1="190" x2="1430" y2="190" stroke="#FFD6E8" stroke-width="2"/>

  <g filter="url(#sh)">
    <rect x="1040" y="206" width="360" height="78" rx="16" class="host"/>
  </g>
  <text x="1060" y="234" class="t">👑 공구 개설 (상품·단가·목표한도)</text>
  <text x="1060" y="256" class="ts">총대 본인인증·계좌인증 완료해야 개설 가능</text>
  <text x="1060" y="274" class="ts">목표 = 면세 한도(엔). 최소 출발 10,000엔 고정</text>

  <g filter="url(#sh)"><rect x="540" y="206" width="380" height="78" rx="16" class="db"/></g>
  <text x="560" y="234" class="t">🗄️ buses</text>
  <text x="560" y="256" class="ts">product_name·product_price·host_qty·goal·</text>
  <text x="560" y="274" class="ts">owner_id·ordered·host_edited(1회 플래그)</text>

  <path class="edge" d="M1040,245 L924,245"/>

  <!-- ════════ PHASE 2 : 탑승 ════════ -->
  <text x="50" y="332" class="ph">② 탑승 (참여)</text>
  <line x1="50" y1="342" x2="1430" y2="342" stroke="#FFD6E8" stroke-width="2"/>

  <g filter="url(#sh)"><rect x="60" y="358" width="400" height="92" rx="16" class="rider"/></g>
  <text x="80" y="386" class="t">🙋 탑승 모달 — 상품/수량/수령방법</text>
  <text x="80" y="408" class="ts">+ 배송지·실명·전화·입금자명(PII)</text>
  <text x="80" y="430" class="ts">탑승 안심 수수료 300P 예치</text>

  <g filter="url(#sh)"><rect x="540" y="350" width="400" height="108" rx="16" class="srv"/></g>
  <text x="560" y="378" class="tw">⚙️ RPC  join_coop_bus  (원자적)</text>
  <text x="560" y="400" class="tws">🛡️ 300P 차감 · 중복탑승 차단</text>
  <text x="560" y="420" class="tws">🛡️ Zero-Yen 금액 위변조 검증</text>
  <text x="560" y="440" class="tws">🛡️ 면세 한도(goal) 초과 탑승 차단</text>

  <g filter="url(#sh)"><rect x="1040" y="358" width="360" height="92" rx="16" class="db"/></g>
  <text x="1060" y="386" class="t">🗄️ bus_riders (공개 장부)</text>
  <text x="1060" y="408" class="ts">+ bus_rider_private (PII · RLS 잠금)</text>
  <text x="1060" y="430" class="ts">qty·yen·method·amount·order_edited</text>

  <path class="edgeP" d="M460,404 L536,404"/>
  <path class="edge" d="M940,404 L1036,404"/>

  <!-- ════════ PHASE 3 : 실시간 투명장부 ════════ -->
  <text x="50" y="506" class="ph">③ 투명 장부 · 실시간</text>
  <line x1="50" y1="516" x2="1430" y2="516" stroke="#FFD6E8" stroke-width="2"/>

  <g filter="url(#sh)"><rect x="540" y="532" width="400" height="74" rx="16" class="srv"/></g>
  <text x="560" y="560" class="tw">📡 Realtime 구독  _busRoomChannel</text>
  <text x="560" y="582" class="tws">bus_riders·buses 변경 → onChange</text>
  <text x="560" y="599" class="tws">reloadBusRoom + 모든 열린 팝업 재렌더</text>

  <g filter="url(#sh)"><rect x="60" y="540" width="400" height="58" rx="16" class="rider"/></g>
  <text x="80" y="566" class="t">🙋 공구방·주문서가 즉시 갱신</text>
  <text x="80" y="586" class="ts">남의 탑승·수정도 새로고침 없이 보임</text>

  <g filter="url(#sh)"><rect x="1040" y="540" width="360" height="58" rx="16" class="host"/></g>
  <text x="1060" y="566" class="t">👑 게이지·합계·인원 실시간 반영</text>
  <text x="1060" y="586" class="ts">_refreshOpenOrderViews 로 발주표도 갱신</text>

  <path class="edgeP" d="M540,570 L462,570"/>
  <path class="edge" d="M940,570 L1038,570" marker-start="url(#arr)"/>

  <!-- ════════ PHASE 4 : 수정 (1회 제한) ════════ -->
  <text x="50" y="664" class="ph">④ 수정 — 상품·가격·수량  <tspan fill="#E5484D">(모두 1회만!)</tspan></text>
  <line x1="50" y1="674" x2="1430" y2="674" stroke="#FFD6E8" stroke-width="2"/>

  <!-- Host edit -->
  <g filter="url(#sh)"><rect x="1040" y="690" width="360" height="92" rx="16" class="host"/></g>
  <text x="1060" y="717" class="t">👑 '내 공구 옵션 수정'</text>
  <text x="1060" y="739" class="ts">상품명·가격·수량 → buses 직접 update</text>
  <text x="1060" y="759" class="guard">🛡️ guard_bus_host_options: 방장·1회만</text>
  <text x="1060" y="776" class="ts">2회차 → 경고 후 차단 (host_edited)</text>

  <!-- Rider request -->
  <g filter="url(#sh)"><rect x="60" y="690" width="400" height="118" rx="16" class="rider"/></g>
  <text x="80" y="717" class="t">🙋 '내 정보 수정'</text>
  <text x="80" y="739" class="ts">상품명·가격·수량·수령 변경은</text>
  <text x="80" y="759" class="ts">→ mod_request(승인 대기)에 담김</text>
  <text x="80" y="781" class="ts">PII(배송지·연락처)는 즉시 반영·무제한</text>
  <text x="80" y="800" class="guard">🛡️ 상품 수정은 1회 (order_edited)</text>

  <!-- approve RPC -->
  <g filter="url(#sh)"><rect x="540" y="690" width="400" height="118" rx="16" class="srv"/></g>
  <text x="560" y="717" class="tw">⚙️ RPC  approve_mod_request (방장만)</text>
  <text x="560" y="739" class="tws">상품명·단가·수량 실제 반영</text>
  <text x="560" y="759" class="tws">🛡️ amount 재계산 · 면세한도 재검증</text>
  <text x="560" y="779" class="tws">🛡️ order_edited=true (1회 소진)</text>
  <text x="560" y="799" class="tws">거절(reject) 시 소진 안 됨 → 재요청 가능</text>

  <path class="edgeP" d="M460,760 L536,760"/>
  <text x="468" y="752" class="guard" fill="#D6437A">요청</text>
  <path class="edge" d="M740,690 C740,640 1220,650 1220,690" marker-end="url(#arr)"/>
  <text x="930" y="648" class="ts" fill="#2D6FE0">총대 승인/거절</text>
  <path class="edge" d="M1040,736 L944,736"/>

  <!-- ════════ PHASE 5 : 마감 ════════ -->
  <text x="50" y="858" class="ph">⑤ 마감 (출발)</text>
  <line x1="50" y1="868" x2="1430" y2="868" stroke="#FFD6E8" stroke-width="2"/>

  <g filter="url(#sh)"><rect x="540" y="884" width="400" height="86" rx="16" class="srv"/></g>
  <text x="560" y="912" class="tw">⚙️ auto_close_bus_if_full</text>
  <text x="560" y="934" class="tws">총합(총대물품 + Σ 라이더 yen×qty) = 목표</text>
  <text x="560" y="954" class="tws">→ ordered=true (자동 마감). 초과는 사전 차단</text>

  <g filter="url(#sh)"><rect x="1040" y="884" width="360" height="86" rx="16" class="host"/></g>
  <text x="1060" y="912" class="t">👑 즉시 출발도 가능</text>
  <text x="1060" y="934" class="ts">10,000엔(무배 기준) 넘으면 마감 전이라도</text>
  <text x="1060" y="954" class="ts">총대가 '즉시 주문' 선택 가능</text>

  <path class="edgeG" d="M940,927 L1038,927" marker-start="url(#arrG)"/>

  <!-- ════════ PHASE 6 : 주문 / 발주 ════════ -->
  <text x="50" y="1020" class="ph">⑥ 입금 · 주문 · 발주</text>
  <line x1="50" y1="1030" x2="1430" y2="1030" stroke="#FFD6E8" stroke-width="2"/>

  <g filter="url(#sh)"><rect x="60" y="1046" width="400" height="74" rx="16" class="rider"/></g>
  <text x="80" y="1073" class="t">🙋 방장 계좌로 입금</text>
  <text x="80" y="1095" class="ts">원클릭 송금(토스/카카오) · 계좌 복사</text>
  <text x="80" y="1112" class="ts">입금자명으로 방장이 확인</text>

  <g filter="url(#sh)"><rect x="1040" y="1046" width="360" height="74" rx="16" class="host"/></g>
  <text x="1060" y="1073" class="t">👑 입금 승인 (approvePay)</text>
  <text x="1060" y="1095" class="ts">통장 확인 → [입금완료]로 장부 갱신</text>
  <text x="1060" y="1112" class="ts">전원 입금 후 일괄 주문 진행</text>

  <g filter="url(#sh)"><rect x="540" y="1046" width="400" height="74" rx="16" class="db"/></g>
  <text x="560" y="1073" class="t">📋 주문서 / 발주표</text>
  <text x="560" y="1095" class="ts">참여자 URL → 🔗 kaiwai.kr/o/코드 단축링크</text>
  <text x="560" y="1112" class="ts">일괄 복사 → 주문처에서 한 번에 주문</text>

  <path class="edgeP" d="M460,1083 L536,1083"/>
  <path class="edge" d="M1040,1083 L944,1083"/>

  <!-- ════════ PHASE 7 : 배송 / 평가 ════════ -->
  <text x="50" y="1170" class="ph">⑦ 배송 · 상호 평가</text>
  <line x1="50" y1="1180" x2="1430" y2="1180" stroke="#FFD6E8" stroke-width="2"/>

  <g filter="url(#sh)"><rect x="1040" y="1196" width="360" height="70" rx="16" class="host"/></g>
  <text x="1060" y="1223" class="t">👑 운송장 입력 → 발송</text>
  <text x="1060" y="1245" class="ts">완료 처리 → finalized=true</text>

  <g filter="url(#sh)"><rect x="540" y="1196" width="400" height="70" rx="16" class="srv"/></g>
  <text x="560" y="1223" class="tw">⚙️ 정산 · 총대 수고비 지급</text>
  <text x="560" y="1243" class="tws">완료 시 host_reward 적립(_wallet_apply)</text>

  <g filter="url(#sh)"><rect x="60" y="1196" width="400" height="70" rx="16" class="rider"/></g>
  <text x="80" y="1223" class="t">🙋 수령 → 상호 평가(매너 점수)</text>
  <text x="80" y="1245" class="ts">총대 신뢰점수·참여자 매너에 반영</text>

  <path class="edge" d="M1040,1231 L944,1231"/>
  <path class="edgeP" d="M540,1231 L462,1231"/>

  <!-- ════════ 서버 방어막 요약 ════════ -->
  <g filter="url(#sh)"><rect x="50" y="1300" width="1380" height="300" rx="22" fill="#fff" stroke="#E5484D" stroke-width="2"/></g>
  <text x="80" y="1342" font-size="20" font-weight="800" fill="#E5484D">🛡️ 서버가 강제하는 안전장치 (클라이언트를 신뢰하지 않음 · Zero-Trust)</text>

  <g>
    <rect x="80" y="1362" width="420" height="106" rx="14" fill="#FFF0F2" stroke="#F3C6CC"/>
    <text x="100" y="1390" class="t" fill="#E5484D">💰 돈 무결성 (Zero-Yen)</text>
    <text x="100" y="1413" class="ts">guard_bus_rider_update 트리거가 참여자의</text>
    <text x="100" y="1431" class="ts">qty·yen·amount·product 직접수정을 동결.</text>
    <text x="100" y="1449" class="ts">금액은 서버가 yen×qty×9 + 배송비로 재계산.</text>
  </g>
  <g>
    <rect x="530" y="1362" width="420" height="106" rx="14" fill="#FFF0F2" stroke="#F3C6CC"/>
    <text x="550" y="1390" class="t" fill="#E5484D">🔒 개인정보 잠금 (RLS)</text>
    <text x="550" y="1413" class="ts">bus_rider_private(배송지·실명·전화)는</text>
    <text x="550" y="1431" class="ts">본인·방장만 조회. 공개 장부엔 PII 없음.</text>
    <text x="550" y="1449" class="ts">mod_request 에도 PII 절대 안 담음.</text>
  </g>
  <g>
    <rect x="980" y="1362" width="420" height="106" rx="14" fill="#FFF0F2" stroke="#F3C6CC"/>
    <text x="1000" y="1390" class="t" fill="#E5484D">📦 면세 한도 (관부가세 방어)</text>
    <text x="1000" y="1413" class="ts">총합이 목표(엔)를 1엔도 못 넘게 차단.</text>
    <text x="1000" y="1431" class="ts">탑승·수량변경·승인 모든 시점에 재검증.</text>
    <text x="1000" y="1449" class="ts">정확히 100% 도달 시 자동 마감.</text>
  </g>
  <g>
    <rect x="80" y="1480" width="420" height="100" rx="14" fill="#FFF0F2" stroke="#F3C6CC"/>
    <text x="100" y="1508" class="t" fill="#E5484D">✋ 수정 1회 제한</text>
    <text x="100" y="1531" class="ts">host_edited / order_edited 플래그 + 트리거.</text>
    <text x="100" y="1549" class="ts">총대=저장 시, 참여자=총대 승인 시 소진.</text>
    <text x="100" y="1567" class="ts">소진 후 재시도는 서버가 거부.</text>
  </g>
  <g>
    <rect x="530" y="1480" width="420" height="100" rx="14" fill="#FFF0F2" stroke="#F3C6CC"/>
    <text x="550" y="1508" class="t" fill="#E5484D">🎟️ 300P 안심 수수료 · 3진아웃</text>
    <text x="550" y="1531" class="ts">탑승 시 300P 예치 → 잠수/먹튀 억제.</text>
    <text x="550" y="1549" class="ts">문제 누적 시 신뢰점수 하락·총대 권한 정지.</text>
    <text x="550" y="1567" class="ts">정상 완료 시 환급/적립.</text>
  </g>
  <g>
    <rect x="980" y="1480" width="420" height="100" rx="14" fill="#FFF0F2" stroke="#F3C6CC"/>
    <text x="1000" y="1508" class="t" fill="#E5484D">🚪 마감 후 잠금</text>
    <text x="1000" y="1531" class="ts">ordered=true 이후 상품·정보 수정 전면 차단</text>
    <text x="1000" y="1549" class="ts">(guard_bus_update_after_ordered, 어드민 예외).</text>
    <text x="1000" y="1567" class="ts">주문 시작 = 정보 확정 시점.</text>
  </g>

  <!-- legend / footer -->
  <text x="50" y="1648" class="ph">한눈에 보는 핵심</text>
  <line x1="50" y1="1658" x2="1430" y2="1658" stroke="#FFD6E8" stroke-width="2"/>
  <g filter="url(#sh)"><rect x="50" y="1676" width="1380" height="120" rx="18" fill="#2B2330"/></g>
  <text x="80" y="1714" font-size="15" fill="#fff" font-weight="800">📌 "총대와 참여자가 화면에서 무엇을 누르든, 돈·면세한도·1회제한·개인정보는 전부 서버(RPC+트리거+RLS)가 다시 검증해서 지킨다."</text>
